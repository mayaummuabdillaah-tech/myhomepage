<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beranda Pribadi</title>
<style>
  :root {
    --bg: #16221F;
    --panel: #1F302B;
    --gold: #C9A227;
    --gold-hover: #dab64a;
    --sage: #7C9A85;
    --cream: #F3EEE2;
    --rose: #B9603F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
  .center-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sage);
    text-align: center; margin-bottom: 8px;
  }
  .divider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 24px 0; }
  .divider .line { height: 1px; width: 40px; background: rgba(124,154,133,0.4); }
  .card {
    background: var(--panel); border: 1px solid rgba(124,154,133,0.2);
    border-radius: 18px; padding: 32px; max-width: 380px; width: 100%; text-align: center;
  }
  h1 { font-family: Georgia, "Times New Roman", serif; font-size: 26px; margin: 0 0 6px; }
  .sub { font-size: 13px; color: var(--sage); margin: 0 0 28px; }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; background: var(--cream); color: #1a1a1a; border: none;
    border-radius: 999px; padding: 12px 20px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .google-btn:hover { background: #fff; }
  .google-btn svg { width: 18px; height: 18px; }

  header.app-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  header.app-header h1 { font-size: 28px; }
  .logout-btn {
    font-size: 13px; color: var(--sage); background: transparent;
    border: 1px solid rgba(124,154,133,0.3); border-radius: 999px;
    padding: 6px 16px; cursor: pointer; white-space: nowrap;
  }
  .logout-btn:hover { color: var(--gold); }

  .section-row { display: flex; justify-content: space-between; align-items: center; margin: 28px 0 18px; }
  .section-label { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sage); }
  .add-btn {
    background: var(--gold); color: var(--bg); border: none; font-weight: 600;
    border-radius: 999px; padding: 8px 18px; font-size: 13px; cursor: pointer;
  }
  .add-btn:hover { background: var(--gold-hover); }

  form.add-form {
    background: var(--panel); border: 1px solid rgba(124,154,133,0.2);
    border-radius: 16px; padding: 20px; margin-bottom: 24px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 520px) { .field-row { grid-template-columns: 1fr; } }
  label { display: block; font-size: 12px; color: var(--sage); margin-bottom: 6px; }
  input[type="text"] {
    width: 100%; background: var(--bg); border: 1px solid rgba(124,154,133,0.3);
    border-radius: 8px; padding: 9px 12px; font-size: 14px; color: var(--cream);
  }
  input[type="text"]:focus { outline: none; border-color: var(--gold); }
  .save-btn {
    background: var(--gold); color: var(--bg); border: none; font-weight: 600;
    border-radius: 999px; padding: 9px 20px; font-size: 14px; cursor: pointer;
  }
  .save-btn:disabled { opacity: 0.6; cursor: default; }
  .error-text { color: var(--rose); font-size: 12px; margin: 0 0 12px; }

  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .menu-grid { grid-template-columns: 1fr; } }
  .menu-card {
    position: relative; background: var(--panel); border: 1px solid rgba(124,154,133,0.2);
    border-radius: 16px; padding: 16px; transition: border-color 0.15s;
  }
  .menu-card:hover { border-color: rgba(201,162,39,0.5); }
  .menu-card a { display: block; text-decoration: none; color: inherit; padding-right: 20px; }
  .menu-name { font-family: Georgia, serif; font-size: 17px; color: var(--cream); }
  .menu-card:hover .menu-name { color: var(--gold); }
  .menu-link { font-size: 11px; color: var(--sage); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .delete-btn {
    position: absolute; top: 12px; right: 12px; background: none; border: none;
    color: var(--sage); cursor: pointer; font-size: 13px; opacity: 0; transition: opacity 0.15s;
  }
  .menu-card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--rose); }

  .empty-state {
    text-align: center; padding: 56px 16px; border: 1px dashed rgba(124,154,133,0.25);
    border-radius: 16px; color: var(--sage); font-size: 13px;
  }
  .hidden { display: none !important; }
  .spinner {
    width: 22px; height: 22px; border: 2px solid var(--gold); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <!-- Layar loading -->
  <div id="screen-loading" class="center-screen">
    <div class="spinner"></div>
  </div>

  <!-- Layar login -->
  <div id="screen-login" class="center-screen hidden">
    <div style="width:100%; max-width:380px;">
      <p class="eyebrow">Beranda Pribadi</p>
      <div class="divider"><span class="line"></span>
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 1 L17 9 L9 17 L1 9 Z" fill="none" stroke="#C9A227" stroke-width="1.2"/><path d="M9 5 L13 9 L9 13 L5 9 Z" fill="#C9A227" opacity="0.5"/></svg>
        <span class="line"></span></div>
      <div class="card">
        <h1>Masuk</h1>
        <p class="sub">Gunakan akun Google ana untuk masuk dengan aman.</p>
        <button id="google-signin-btn" class="google-btn">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.4 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C39.9 36.6 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
          Masuk dengan Google
        </button>
        <p id="login-error" class="error-text hidden"></p>
      </div>
    </div>
  </div>

  <!-- Layar beranda -->
  <div id="screen-home" class="wrap hidden">
    <header class="app-header">
      <div>
        <p class="eyebrow" style="text-align:left;">Beranda</p>
        <h1>Assalamu'alaikum, <span id="user-name"></span></h1>
      </div>
      <button id="logout-btn" class="logout-btn">Keluar</button>
    </header>

    <div class="divider"><span class="line"></span>
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 1 L17 9 L9 17 L1 9 Z" fill="none" stroke="#C9A227" stroke-width="1.2"/><path d="M9 5 L13 9 L9 13 L5 9 Z" fill="#C9A227" opacity="0.5"/></svg>
      <span class="line"></span></div>

    <div class="section-row">
      <span class="section-label">Menu Tersimpan</span>
      <button id="toggle-add-btn" class="add-btn">+ Tambah Menu</button>
    </div>

    <form id="add-form" class="add-form hidden">
      <div class="field-row">
        <div>
          <label for="menu-name">Nama menu</label>
          <input type="text" id="menu-name" placeholder="Contoh: Jadwal BISA" />
        </div>
        <div>
          <label for="menu-link">Link</label>
          <input type="text" id="menu-link" placeholder="contoh.com/halaman" />
        </div>
      </div>
      <p id="add-error" class="error-text hidden"></p>
      <button type="submit" id="save-menu-btn" class="save-btn">Simpan Menu</button>
    </form>

    <div id="menu-empty" class="empty-state hidden">
      Belum ada menu. Tambahkan menu pertama ana di atas.
    </div>
    <div id="menu-grid" class="menu-grid"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // =====================================================================
  // GANTI bagian ini dengan config dari Firebase Console punya ana
  // Project Settings -> General -> scroll ke "Your apps" -> Web app
  // =====================================================================
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBEPGdV9QV9Qrpg2tWldQV5ATbYdeBIzdY",
  authDomain: "beranda-maya.firebaseapp.com",
  projectId: "beranda-maya",
  storageBucket: "beranda-maya.firebasestorage.app",
  messagingSenderId: "995940610110",
  appId: "1:995940610110:web:a3a6ebb2b9caf2d1eb616f",
  measurementId: "G-P168HSRKN0"
};
  // =====================================================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const screenLoading = document.getElementById("screen-loading");
  const screenLogin = document.getElementById("screen-login");
  const screenHome = document.getElementById("screen-home");
  const loginError = document.getElementById("login-error");
  const userNameEl = document.getElementById("user-name");

  function showScreen(name) {
    screenLoading.classList.add("hidden");
    screenLogin.classList.add("hidden");
    screenHome.classList.add("hidden");
    if (name === "loading") screenLoading.classList.remove("hidden");
    if (name === "login") screenLogin.classList.remove("hidden");
    if (name === "home") screenHome.classList.remove("hidden");
  }

  document.getElementById("google-signin-btn").addEventListener("click", async () => {
    loginError.classList.add("hidden");
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      loginError.textContent = "Gagal masuk: " + err.message;
      loginError.classList.remove("hidden");
    }
  });

  document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

  let unsubscribeMenus = null;

  onAuthStateChanged(auth, (user) => {
    if (unsubscribeMenus) { unsubscribeMenus(); unsubscribeMenus = null; }
    if (user) {
      userNameEl.textContent = user.displayName || user.email;
      showScreen("home");
      listenToMenus(user.uid);
    } else {
      showScreen("login");
    }
  });

  // Tunjukkan layar login kalau belum ada status auth setelah render awal
  showScreen("loading");

  // ---------- Menu CRUD ----------
  const toggleAddBtn = document.getElementById("toggle-add-btn");
  const addForm = document.getElementById("add-form");
  const addError = document.getElementById("add-error");
  const menuNameInput = document.getElementById("menu-name");
  const menuLinkInput = document.getElementById("menu-link");
  const saveMenuBtn = document.getElementById("save-menu-btn");
  const menuGrid = document.getElementById("menu-grid");
  const menuEmpty = document.getElementById("menu-empty");

  toggleAddBtn.addEventListener("click", () => {
    addForm.classList.toggle("hidden");
    addError.classList.add("hidden");
    toggleAddBtn.textContent = addForm.classList.contains("hidden") ? "+ Tambah Menu" : "Tutup";
  });

  function normalizeUrl(url) {
    const trimmed = url.trim();
    if (!trimmed) return "";
    if (!/^https?:\/\//i.test(trimmed)) return "https://" + trimmed;
    return trimmed;
  }

  function listenToMenus(uid) {
    const menusRef = collection(db, "users", uid, "menus");
    const q = query(menusRef, orderBy("createdAt", "asc"));
    unsubscribeMenus = onSnapshot(q, (snapshot) => {
      menuGrid.innerHTML = "";
      if (snapshot.empty) {
        menuEmpty.classList.remove("hidden");
        return;
      }
      menuEmpty.classList.add("hidden");
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const card = document.createElement("div");
        card.className = "menu-card";
        card.innerHTML = `
          <a href="${data.link}" target="_blank" rel="noopener noreferrer">
            <div class="menu-name">${escapeHtml(data.name)}</div>
            <div class="menu-link">${escapeHtml(data.link)}</div>
          </a>
          <button class="delete-btn" aria-label="Hapus menu ${escapeHtml(data.name)}">✕</button>
        `;
        card.querySelector(".delete-btn").addEventListener("click", async () => {
          await deleteDoc(doc(db, "users", uid, "menus", docSnap.id));
        });
        menuGrid.appendChild(card);
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  addForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    addError.classList.add("hidden");
    const name = menuNameInput.value.trim();
    const link = normalizeUrl(menuLinkInput.value);
    if (!name || !link) {
      addError.textContent = "Nama menu dan link wajib diisi.";
      addError.classList.remove("hidden");
      return;
    }
    try { new URL(link); } catch {
      addError.textContent = "Link sepertinya tidak valid.";
      addError.classList.remove("hidden");
      return;
    }
    const user = auth.currentUser;
    if (!user) return;
    saveMenuBtn.disabled = true;
    saveMenuBtn.textContent = "Menyimpan...";
    try {
      await addDoc(collection(db, "users", user.uid, "menus"), {
        name, link, createdAt: serverTimestamp()
      });
      menuNameInput.value = "";
      menuLinkInput.value = "";
      addForm.classList.add("hidden");
      toggleAddBtn.textContent = "+ Tambah Menu";
    } catch (err) {
      addError.textContent = "Gagal menyimpan: " + err.message;
      addError.classList.remove("hidden");
    } finally {
      saveMenuBtn.disabled = false;
      saveMenuBtn.textContent = "Simpan Menu";
    }
  });
</script>
</body>
</html>
